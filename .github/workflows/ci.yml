name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Tests
        run: npm test

      - name: Runtime dependency audit
        run: npm audit --omit=dev
